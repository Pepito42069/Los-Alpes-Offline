<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Mi Finca — Cuentas e Inventario</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#24402A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mi Finca">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  :root{
    color-scheme: light;
    --paper:#EFE6D0; --paper-dark:#E4D8B8; --card:#FBF6E9;
    --green:#24402A; --green-light:#3B5940;
    --ink:#3B2E20; --ink-faint:#7A6A52;
    --ochre:#B8791F; --ochre-light:#D9A552;
    --brick:#9A3324; --brick-light:#C9584A;
    --olive:#5C7A4B; --olive-light:#7E9C6C;
    --line:#C9BB94;
    --shadow-sm: 0 1px 2px rgba(59,46,32,.06), 0 1px 1px rgba(59,46,32,.08);
    --shadow-md: 0 4px 14px rgba(59,46,32,.10), 0 1px 3px rgba(59,46,32,.08);
    --shadow-lift: 0 8px 22px rgba(59,46,32,.14), 0 2px 6px rgba(59,46,32,.10);
    --ease: cubic-bezier(.2,.7,.3,1);
  }
  *{box-sizing:border-box;}
  html{ -webkit-tap-highlight-color: transparent; }
  body{
    margin:0; color:var(--ink);
    background:
      radial-gradient(1200px 500px at 15% -10%, #ffffff33, transparent 60%),
      radial-gradient(900px 400px at 100% 0%, #ffffff22, transparent 55%),
      var(--paper-dark);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{ background:var(--ochre-light); color:var(--ink); }
  .serif{ font-family:Georgia,"Times New Roman",serif; }
  .mono{ font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace; }
  header{
    background:linear-gradient(155deg, var(--green) 0%, var(--green-light) 100%);
    padding:20px 16px 0; position:relative; z-index:1;
    box-shadow: 0 2px 10px rgba(0,0,0,.15);
  }
  header h1{ margin:0; color:var(--paper); font-size:21px; font-weight:800; letter-spacing:.2px; display:flex; align-items:center; gap:8px; }
  header p{ margin:3px 0 12px; color:var(--olive-light); font-size:12px; letter-spacing:.1px; }
  nav{ display:flex; gap:4px; background:var(--green); padding:0 8px; position:relative; z-index:1; }
  nav button{
    flex:1; border:none; background:transparent; color:var(--paper);
    opacity:.62; font-size:12px; font-weight:600; padding:11px 4px; border-radius:10px 10px 0 0;
    border-top:2px solid transparent; cursor:pointer;
    transition: background-color .18s var(--ease), opacity .18s var(--ease), color .18s var(--ease);
  }
  nav button:hover{ opacity:.85; }
  nav button.active{
    background:var(--card); color:var(--green); border-top-color:var(--ochre);
    opacity:1; box-shadow: 0 -2px 8px rgba(0,0,0,.08);
  }
  main{ max-width:640px; margin:0 auto; padding:18px 16px 40px; }
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:16px; margin-bottom:14px; box-shadow: var(--shadow-sm);
    animation: rise .28s var(--ease);
  }
  .card-alert{
    border-color:var(--brick-light);
    background: linear-gradient(180deg, #FBF6E9 0%, #FBF6E9 60%, #F7E6DE 150%);
    box-shadow: var(--shadow-sm), inset 3px 0 0 var(--brick-light);
  }
  @keyframes rise{ from{ opacity:0; transform:translateY(4px); } to{ opacity:1; transform:translateY(0); } }
  @media (prefers-reduced-motion: reduce){
    .card{ animation:none; }
    *{ scroll-behavior:auto !important; }
  }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .stat-label{ font-size:11px; font-weight:700; color:var(--ink-faint); letter-spacing:.2px; text-transform:uppercase; }
  .stat-value{ font-size:20px; font-weight:800; margin-top:5px; letter-spacing:-.2px; }
  .row{ display:flex; justify-content:space-between; align-items:center; gap:8px; padding:11px 0; border-bottom:1px solid var(--line); transition:background-color .15s var(--ease); }
  .row:last-child{ border-bottom:none; }
  .row:hover{ background: linear-gradient(90deg, transparent, #0000, transparent), rgba(59,46,32,.03); margin:0 -8px; padding-left:8px; padding-right:8px; border-radius:8px; }
  .muted{ color:var(--ink-faint); font-size:12px; }
  .btn{
    display:inline-flex; align-items:center; gap:6px; border:none; border-radius:999px;
    padding:10px 18px; font-size:13px; font-weight:700; cursor:pointer;
    box-shadow: var(--shadow-sm);
    transition: transform .12s var(--ease), box-shadow .18s var(--ease), filter .15s var(--ease);
  }
  .btn-green{ background:var(--green); color:var(--paper); }
  .btn-ochre{ background:var(--ochre); color:#2b1b04; }
  .btn-ghost{ background:transparent; color:var(--ink-faint); box-shadow:none; }
  .btn:hover{ filter:brightness(1.07); box-shadow: var(--shadow-md); }
  .btn-ghost:hover{ filter:none; background:rgba(59,46,32,.06); box-shadow:none; }
  .btn:active{ transform:scale(.96); box-shadow: var(--shadow-sm); }
  .btn:focus-visible, .icon-btn:focus-visible, nav button:focus-visible, .filters button:focus-visible, .toggle-type button:focus-visible{
    outline: 2px solid var(--ochre); outline-offset: 2px;
  }
  label{ font-size:12px; font-weight:600; color:var(--ink-faint); display:block; margin-bottom:3px; }
  input, select{
    width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:8px;
    font-size:14px; background:#fffb; color:var(--ink);
    transition: border-color .15s var(--ease), box-shadow .15s var(--ease), background-color .15s var(--ease);
  }
  input:hover, select:hover{ border-color:var(--ink-faint); }
  input:focus, select:focus{
    outline:none; border-color:var(--ochre); background:#fff;
    box-shadow: 0 0 0 3px rgba(184,121,31,.18);
  }
  input[type="checkbox"]{ accent-color: var(--olive); }
  .field{ margin-bottom:10px; }
  .fields2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .fields3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
  .toggle-type{ display:flex; gap:8px; margin-bottom:10px; }
  .toggle-type button{
    flex:1; padding:10px; border-radius:10px; font-weight:700; font-size:13px; cursor:pointer;
    border:1px solid var(--line); background:transparent; color:var(--ink); text-transform:capitalize;
    transition: background-color .16s var(--ease), color .16s var(--ease), border-color .16s var(--ease), box-shadow .16s var(--ease);
  }
  .toggle-type button:hover{ border-color:var(--ink-faint); }
  .toggle-type button.on-ingreso{ background:var(--olive); color:var(--paper); border-color:var(--olive); box-shadow:var(--shadow-sm); }
  .toggle-type button.on-gasto{ background:var(--brick); color:var(--paper); border-color:var(--brick); box-shadow:var(--shadow-sm); }
  .filters{ display:flex; gap:6px; margin-bottom:10px; }
  .filters button{
    padding:6px 13px; border-radius:999px; font-size:11px; font-weight:700; cursor:pointer;
    border:1px solid var(--green); background:transparent; color:var(--ink-faint); text-transform:capitalize;
    transition: background-color .16s var(--ease), color .16s var(--ease);
  }
  .filters button:hover{ background:rgba(36,64,42,.08); }
  .filters button.active{ background:var(--green); color:var(--paper); }
  .icon-btn{
    background:none; border:none; cursor:pointer; padding:7px; font-size:14px;
    border-radius:999px; line-height:1; transition: background-color .15s var(--ease), transform .12s var(--ease);
  }
  .icon-btn:hover{ background:rgba(59,46,32,.08); }
  .icon-btn:active{ transform:scale(.9); }
  .warn{ color:var(--brick); }
  .ok{ color:var(--olive); }
  .empty{ text-align:center; color:var(--ink-faint); font-size:13px; padding:30px 0; }
  .empty::before{ content:"🗒️"; display:block; font-size:26px; margin-bottom:8px; opacity:.55; }
  .bars{ display:flex; align-items:flex-end; gap:10px; height:150px; padding-top:8px; }
  .bar-group{ flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; }
  .bar-pair{ display:flex; align-items:flex-end; gap:3px; height:120px; }
  .bar{ width:12px; border-radius:4px 4px 1px 1px; transition: height .5s var(--ease); box-shadow: inset 0 -2px 3px rgba(0,0,0,.08); }
  .pie-wrap{ display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  .pie{ width:120px; height:120px; border-radius:50%; flex-shrink:0; box-shadow: var(--shadow-md), inset 0 0 0 6px var(--card); }
  .legend-item{ display:flex; align-items:center; gap:6px; font-size:12px; margin-bottom:4px; }
  .dot{ width:9px; height:9px; border-radius:50%; display:inline-block; box-shadow: 0 0 0 2px #0000, 0 1px 1px rgba(0,0,0,.15); }
  .backup-row{ display:flex; gap:8px; flex-wrap:wrap; }
  table{ width:100%; border-collapse:collapse; font-size:13px; }
  th{ text-align:left; font-size:11px; font-weight:700; letter-spacing:.2px; text-transform:uppercase; color:var(--ink-faint); padding-bottom:6px; border-bottom:1px solid var(--line); }
  td{ padding:7px 0; border-bottom:1px solid var(--line); }
  tbody tr{ transition: background-color .15s var(--ease); }
  tbody tr:hover{ background:rgba(59,46,32,.035); }
  @media print{
    header, nav, .no-print{ display:none !important; }
    body{ background:#fff; }
    .card{ border:none; box-shadow:none; animation:none; }
  }
</style>
</head>
<body>
<header>
  <h1>🌾 <span id="finca-nombre">Mi Finca</span></h1>
  <p>Ganado de levante y leche · Cuentas e inventario · funciona sin internet</p>
</header>
<nav id="tabnav" class="no-print"></nav>
<main id="app"></main>

<script type="module">
import {
  INCOME_CATS, EXPENSE_CATS, INV_CATS, UNIT_OPTIONS,
  fmtCOP, fmtDate, monthLabel, todayISO, escapeHtml as esc,
  loadData, saveData,
  computeSummary, totalProducidoByOrdeno, computeMilkChartMax,
  findDuplicateMilkRecord, computeReport, buildTransactionsCsv, buildBackupPayload,
  parseBackupData, parseTransactionForm, parseInventoryForm, parseMilkForm, parseCowForm,
  getLastMilkPrice, syncMilkSaleTransaction, removeMilkSaleTransaction,
} from "./app-logic.js";

// ---------- State ----------
const data0 = loadData(localStorage);
const state = {
  tab: "resumen",
  transactions: data0.transactions || [],
  inventory: data0.inventory || [],
  cows: data0.cows || [],
  milkRecords: data0.milkRecords || [],
  editingTx: null,
  editingInv: null,
  editingMilk: null,
  editingCow: null,
  filter: "todos",
  repFrom: (()=>{ const d=new Date(); d.setMonth(d.getMonth()-1); return d.toISOString().slice(0,10); })(),
  repTo: new Date().toISOString().slice(0,10),
};

function setTab(t){ state.tab=t; render(); }
window.setTab = setTab;

// ---------- Render ----------
function render(){
  renderNav();
  const app = document.getElementById("app");
  if(state.tab==="resumen") app.innerHTML = viewResumen();
  else if(state.tab==="cuentas") app.innerHTML = viewCuentas();
  else if(state.tab==="inventario") app.innerHTML = viewInventario();
  else if(state.tab==="produccion") app.innerHTML = viewProduccion();
  else if(state.tab==="reportes") app.innerHTML = viewReportes();
  bindEvents();
}

function renderNav(){
  const tabs = [["resumen","📋 Resumen"],["cuentas","💰 Cuentas"],["inventario","📦 Inventario"],["produccion","🐄 Producción"],["reportes","📊 Reportes"]];
  document.getElementById("tabnav").innerHTML = tabs.map(([id,label])=>
    `<button class="${state.tab===id?'active':''}" onclick="setTab('${id}')">${label}</button>`
  ).join("");
}

// ---------- Resumen ----------
function viewResumen(){
  const { ingresos, gastos, balance, valorInv, monthly, maxVal, lowStock } = computeSummary(state);

  let html = `<div class="card"><div class="grid2">
    <div><div class="stat-label">Balance</div><div class="stat-value ${balance>=0?'ok':'warn'}">${fmtCOP(balance)}</div></div>
    <div><div class="stat-label">Valor inventario</div><div class="stat-value" style="color:var(--green)">${fmtCOP(valorInv)}</div></div>
    <div><div class="stat-label ok">↑ Ingresos</div><div class="stat-value" style="font-size:15px">${fmtCOP(ingresos)}</div></div>
    <div><div class="stat-label warn">↓ Gastos</div><div class="stat-value" style="font-size:15px">${fmtCOP(gastos)}</div></div>
  </div></div>`;

  if(monthly.length>0){
    html += `<div class="card"><div style="font-weight:700;color:var(--green);margin-bottom:4px;font-size:14px">Ingresos vs. gastos (últimos meses)</div>
    <div class="bars">${monthly.map(m=>`
      <div class="bar-group">
        <div class="bar-pair">
          <div class="bar" style="height:${(m.ingreso/maxVal*120)||0}px;background:var(--olive)"></div>
          <div class="bar" style="height:${(m.gasto/maxVal*120)||0}px;background:var(--brick)"></div>
        </div>
        <div style="font-size:10px;color:var(--ink-faint)">${m.label}</div>
      </div>`).join("")}
    </div>
    <div style="display:flex;gap:14px;margin-top:8px;font-size:11px">
      <span><span class="dot" style="background:var(--olive)"></span> Ingreso</span>
      <span><span class="dot" style="background:var(--brick)"></span> Gasto</span>
    </div></div>`;
  }

  if(lowStock.length>0){
    html += `<div class="card card-alert">
      <div style="font-weight:700;color:var(--brick);margin-bottom:6px;font-size:14px">⚠️ Inventario bajo</div>
      ${lowStock.map(i=>`<div class="row"><span>${esc(i.name)}</span><span class="mono">${esc(i.quantity)} ${esc(i.unit)}</span></div>`).join("")}
    </div>`;
  }

  if(state.transactions.length===0 && state.inventory.length===0){
    html += `<p class="empty">Aún no hay datos. Empieza registrando una cuenta o un ítem de inventario.</p>`;
  }
  return html;
}

// ---------- Cuentas ----------
function viewCuentas(){
  const e = state.editingTx;
  const type = e ? e.type : (window._txType || "ingreso");
  const cats = type==="ingreso" ? INCOME_CATS : EXPENSE_CATS;
  let list = [...state.transactions];
  if(state.filter!=="todos") list = list.filter(t=>t.type===state.filter);
  list.sort((a,b)=>b.date.localeCompare(a.date));

  return `
  <div class="card">
    <form id="tx-form">
      <div class="toggle-type">
        <button type="button" data-type="ingreso" class="${type==='ingreso'?'on-ingreso':''}">ingreso</button>
        <button type="button" data-type="gasto" class="${type==='gasto'?'on-gasto':''}">gasto</button>
      </div>
      <div class="fields2">
        <div class="field"><label>Categoría</label>
          <select name="category">${cats.map(c=>`<option ${e&&e.category===c?'selected':''}>${c}</option>`).join("")}</select>
        </div>
        <div class="field"><label>Monto (COP)</label>
          <input class="mono" type="number" min="0" step="1000" name="amount" value="${e?esc(e.amount):''}" placeholder="0" required>
        </div>
      </div>
      <div class="fields2">
        <div class="field"><label>Fecha</label>
          <input type="date" name="date" value="${e?esc(e.date):todayISO()}" required>
        </div>
        <div class="field"><label>Nota (opcional)</label>
          <input type="text" name="note" value="${e?esc(e.note||''):''}" placeholder="Detalle">
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:8px">
        ${e?`<button type="button" class="btn btn-ghost" id="tx-cancel">Cancelar</button>`:""}
        <button type="submit" class="btn ${e?'btn-ochre':'btn-green'}">${e?'Guardar cambios':'➕ Registrar'}</button>
      </div>
      <input type="hidden" name="type" value="${type}">
      <input type="hidden" name="id" value="${e?esc(e.id):''}">
    </form>
  </div>
  <div class="filters no-print">
    ${["todos","ingreso","gasto"].map(f=>`<button class="${state.filter===f?'active':''}" data-filter="${f}">${f}</button>`).join("")}
  </div>
  <div class="card">
    ${list.length===0 ? `<p class="empty">Sin movimientos registrados.</p>` :
      list.map(t=>`
      <div class="row">
        <div style="min-width:0">
          <div style="font-weight:600;font-size:14px">${esc(t.category)}</div>
          <div class="muted">${fmtDate(t.date)}${t.note?' · '+esc(t.note):''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
          <span class="mono ${t.type==='ingreso'?'ok':'warn'}" style="font-weight:700;font-size:13px">${t.type==='ingreso'?'+':'−'}${fmtCOP(t.amount)}</span>
          <button class="icon-btn" data-edit-tx="${esc(t.id)}">✎</button>
          <button class="icon-btn" data-del-tx="${esc(t.id)}">✕</button>
        </div>
      </div>`).join("")}
  </div>`;
}

// ---------- Inventario ----------
function viewInventario(){
  const e = state.editingInv;
  const list = [...state.inventory].sort((a,b)=>a.name.localeCompare(b.name));
  return `
  <div class="card">
    <form id="inv-form">
      <div class="fields2">
        <div class="field"><label>Nombre del ítem</label>
          <input type="text" name="name" value="${e?esc(e.name):''}" placeholder="Ej. Concentrado 18% proteína" required></div>
        <div class="field"><label>Categoría</label>
          <select name="category">${INV_CATS.map(c=>`<option ${e&&e.category===c?'selected':''}>${c}</option>`).join("")}</select></div>
      </div>
      <div class="fields3">
        <div class="field"><label>Cantidad</label>
          <input class="mono" type="number" step="0.01" name="quantity" value="${e?esc(e.quantity):''}" required></div>
        <div class="field"><label>Unidad</label>
          <select name="unit">${UNIT_OPTIONS.map(u=>`<option ${e&&e.unit===u?'selected':''}>${u}</option>`).join("")}</select></div>
        <div class="field"><label>Valor unitario</label>
          <input class="mono" type="number" step="100" name="unitValue" value="${e?esc(e.unitValue):''}" required></div>
      </div>
      <div class="field"><label>Alertar si la cantidad es menor o igual a (opcional)</label>
        <input class="mono" type="number" step="0.01" name="minStock" value="${e&&e.minStock!=null?esc(e.minStock):''}" style="max-width:140px" placeholder="—"></div>
      <div style="display:flex;justify-content:flex-end;gap:8px">
        ${e?`<button type="button" class="btn btn-ghost" id="inv-cancel">Cancelar</button>`:""}
        <button type="submit" class="btn ${e?'btn-ochre':'btn-green'}">${e?'Guardar cambios':'➕ Agregar'}</button>
      </div>
      <input type="hidden" name="id" value="${e?esc(e.id):''}">
    </form>
  </div>
  <div class="card">
    ${list.length===0 ? `<p class="empty">Sin ítems en el inventario.</p>` :
      list.map(i=>{
        const low = i.minStock!=null && i.quantity<=i.minStock;
        return `<div class="row">
          <div style="min-width:0">
            <div style="font-weight:600;font-size:14px">${low?'⚠️ ':''}${esc(i.name)}</div>
            <div class="muted">${esc(i.category)} · ${fmtDate(i.lastUpdated)}</div>
          </div>
          <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
            <div style="text-align:right">
              <div class="mono ${low?'warn':''}" style="font-weight:700;font-size:13px">${esc(i.quantity)} ${esc(i.unit)}</div>
              <div class="mono muted">${fmtCOP(i.quantity*i.unitValue)}</div>
            </div>
            <button class="icon-btn" data-edit-inv="${esc(i.id)}">✎</button>
            <button class="icon-btn" data-del-inv="${esc(i.id)}">✕</button>
          </div>
        </div>`;
      }).join("")}
  </div>`;
}

// ---------- Producción de leche ----------
function viewProduccion(){
  const em = state.editingMilk;
  const ec = state.editingCow;
  const cows = state.cows;
  const perCow = em ? em.perCow || {} : {};
  const hasCalves = window._hasCalves !== false;
  const lastMilkPrice = getLastMilkPrice(state.milkRecords);

  const cowsBlock = cows.length===0
    ? `<p class="muted" style="margin-bottom:8px">Agrega tus vacas para empezar a registrar litros por cada una.</p>`
    : `<div style="margin-bottom:10px">
        <div class="fields2" style="margin-bottom:2px"><span></span>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <span class="muted" style="font-size:10px;text-align:center">Mañana</span>
            <span class="muted" style="font-size:10px;text-align:center">Tarde</span>
          </div>
        </div>
        ${cows.map(c=>{
          const pcv = perCow[c.id];
          const am = pcv && typeof pcv === "object" ? pcv.am : (pcv!=null?pcv:'');
          const pm = pcv && typeof pcv === "object" ? pcv.pm : '';
          return `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;align-items:end;margin-bottom:6px">
            <label style="align-self:center;margin-bottom:0">${esc(c.name)}</label>
            <input class="mono" type="number" step="0.1" min="0" name="am_${esc(c.id)}" value="${am!==''?esc(am):''}" placeholder="L">
            <input class="mono" type="number" step="0.1" min="0" name="pm_${esc(c.id)}" value="${pm!==''?esc(pm):''}" placeholder="L">
          </div>`;
        }).join("")}
      </div>`;

  const records = [...state.milkRecords].sort((a,b)=>b.date.localeCompare(a.date));
  const recent = [...state.milkRecords].sort((a,b)=>a.date.localeCompare(b.date)).slice(-10);
  const maxVal = computeMilkChartMax(recent);

  return `
  <div class="card">
    <div style="font-weight:700;color:var(--green);margin-bottom:8px;font-size:14px">🐄 Tus vacas</div>
    <form id="cow-form">
      <div class="fields2">
        <div class="field"><label>Nombre o número</label>
          <input type="text" name="name" value="${ec?esc(ec.name):''}" placeholder="Ej. Lola" required></div>
        <div class="field"><label>Peso (kg, opcional)</label>
          <input class="mono" type="number" step="0.1" min="0" name="weight" value="${ec&&ec.weight!=null?esc(ec.weight):''}" placeholder="—"></div>
      </div>
      <div class="fields2">
        <div class="field"><label>Último parto (opcional)</label>
          <input type="date" name="lastCalvingDate" value="${ec&&ec.lastCalvingDate?esc(ec.lastCalvingDate):''}"></div>
        <div class="field"><label>Notas de salud (opcional)</label>
          <input type="text" name="healthNotes" value="${ec?esc(ec.healthNotes||''):''}" placeholder="Ej. vacunada, cojea..."></div>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:8px">
        ${ec?`<button type="button" class="btn btn-ghost" id="cow-cancel">Cancelar</button>`:""}
        <button type="submit" class="btn ${ec?'btn-ochre':'btn-green'}">${ec?'Guardar cambios':'➕ Agregar vaca'}</button>
      </div>
      <input type="hidden" name="id" value="${ec?esc(ec.id):''}">
    </form>
    ${cows.length===0 ? `<p class="empty" style="padding:16px 0">Aún no has agregado vacas.</p>` :
      `<div style="margin-top:8px">${cows.map(c=>{
        const details = [
          c.weight!=null ? `${esc(c.weight)} kg` : null,
          c.lastCalvingDate ? `Parto: ${fmtDate(c.lastCalvingDate)}` : null,
          c.healthNotes ? esc(c.healthNotes) : null,
        ].filter(Boolean).join(' · ') || 'Sin datos adicionales';
        return `<div class="row">
          <div style="min-width:0">
            <div style="font-weight:600;font-size:14px">${esc(c.name)}</div>
            <div class="muted">${details}</div>
          </div>
          <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
            <button class="icon-btn" data-edit-cow="${esc(c.id)}">✎</button>
            <button class="icon-btn" data-del-cow="${esc(c.id)}">✕</button>
          </div>
        </div>`;
      }).join("")}</div>`}
  </div>

  <div class="card">
    <div style="font-weight:700;color:var(--green);margin-bottom:8px;font-size:14px">Registro diario · 2 ordeños</div>
    <form id="milk-form">
      <div class="field"><label>Fecha</label>
        <input type="date" name="date" value="${em?esc(em.date):todayISO()}" required></div>
      ${cowsBlock}
      <div class="field"><label>Consumo en la finca (L)</label>
        <input class="mono" type="number" step="0.1" min="0" name="farmConsumption" value="${em?esc(em.farmConsumption):''}" placeholder="0"></div>
      <label style="display:flex;align-items:center;gap:6px;margin-bottom:8px;cursor:pointer">
        <input type="checkbox" id="has-calves-toggle" style="width:auto" ${hasCalves?'checked':''}>
        <span style="font-weight:600;color:var(--ink-faint)">Hay terneros lactando en este período</span>
      </label>
      ${hasCalves?`<div class="field"><label>Consumo terneros (L)</label>
        <input class="mono" type="number" step="0.1" min="0" name="calfConsumption" value="${em?esc(em.calfConsumption):''}" placeholder="0"></div>`:""}
      <div class="fields2">
        <div class="field"><label>Litros entregados al lechero (L)</label>
          <input class="mono" type="number" step="0.1" min="0" name="deliveredToMilkman" value="${em?esc(em.deliveredToMilkman||''):''}" placeholder="0"></div>
        <div class="field"><label>Precio por litro (COP)</label>
          <input class="mono" type="number" step="50" min="0" name="pricePerLiter" value="${em?esc(em.pricePerLiter||''):(lastMilkPrice!=null?esc(lastMilkPrice):'')}" placeholder="0"></div>
      </div>
      <p class="muted" style="margin-top:-6px;margin-bottom:10px">Si registras litros y precio, se genera automáticamente una venta de leche en Cuentas.</p>
      <div class="field"><label>Nota (opcional)</label>
        <input type="text" name="note" value="${em?esc(em.note||''):''}" placeholder="Detalle"></div>
      <div style="display:flex;justify-content:flex-end;gap:8px">
        ${em?`<button type="button" class="btn btn-ghost" id="milk-cancel">Cancelar</button>`:""}
        <button type="submit" class="btn ${em?'btn-ochre':'btn-green'}">${em?'Guardar cambios':'➕ Registrar día'}</button>
      </div>
      <input type="hidden" name="id" value="${em?esc(em.id):''}">
    </form>
  </div>

  ${recent.length>0?`
  <div class="card">
    <div style="font-weight:700;color:var(--green);margin-bottom:4px;font-size:14px">Producción por ordeño (últimos días)</div>
    <div class="bars">${recent.map(r=>{
      const { am, pm } = totalProducidoByOrdeno(r);
      return `
      <div class="bar-group">
        <div class="bar-pair">
          <div class="bar" style="height:${(am/maxVal*120)||0}px;background:var(--olive)"></div>
          <div class="bar" style="height:${(pm/maxVal*120)||0}px;background:var(--ochre)"></div>
        </div>
        <div style="font-size:9px;color:var(--ink-faint)">${fmtDate(r.date).slice(0,6)}</div>
      </div>`;
    }).join("")}
    </div>
    <div style="display:flex;gap:14px;margin-top:8px;font-size:11px">
      <span><span class="dot" style="background:var(--olive)"></span> Mañana</span>
      <span><span class="dot" style="background:var(--ochre)"></span> Tarde</span>
    </div>
  </div>`:""}

  <div class="card">
    <div style="font-weight:700;color:var(--green);margin-bottom:4px;font-size:14px">Registro diario</div>
    ${records.length===0?`<p class="empty">Sin registros aún.</p>`:
      records.map(r=>{
        const { am, pm } = totalProducidoByOrdeno(r);
        const parts = [
          `Mañana ${am.toFixed(1)} L`,
          `Tarde ${pm.toFixed(1)} L`,
          `Finca ${esc(r.farmConsumption)} L`,
        ];
        if(r.hasCalves !== false) parts.push(`Terneros ${esc(r.calfConsumption)} L`);
        if(r.deliveredToMilkman > 0) parts.push(`Lechero ${esc(r.deliveredToMilkman)} L`);
        if(r.deliveredToMilkman > 0 && r.pricePerLiter > 0) parts.push(`Venta ${fmtCOP(r.deliveredToMilkman * r.pricePerLiter)}`);
        if(r.note) parts.push(esc(r.note));
        return `<div class="row">
          <div style="min-width:0">
            <div style="font-weight:600;font-size:14px">${fmtDate(r.date)}</div>
            <div class="muted">${parts.join(' · ')}</div>
          </div>
          <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
            <button class="icon-btn" data-edit-milk="${esc(r.id)}">✎</button>
            <button class="icon-btn" data-del-milk="${esc(r.id)}">✕</button>
          </div>
        </div>`;
      }).join("")}
  </div>`;
}

// ---------- Reportes ----------
function viewReportes(){
  const { filtered, ingresos, gastos, catList, gradient } = computeReport(state.transactions, state.repFrom, state.repTo);

  return `
  <div class="card no-print">
    <div class="fields2">
      <div class="field"><label>Desde</label><input type="date" id="rep-from" value="${esc(state.repFrom)}"></div>
      <div class="field"><label>Hasta</label><input type="date" id="rep-to" value="${esc(state.repTo)}"></div>
    </div>
    <div class="backup-row" style="margin-bottom:10px">
      <button class="btn btn-ochre" id="export-csv">⬇ CSV (Excel)</button>
      <button class="btn btn-green" onclick="window.print()">🖨 Imprimir / PDF</button>
    </div>
    <div style="border-top:1px solid var(--line);padding-top:10px">
      <div style="font-weight:700;color:var(--green);margin-bottom:6px;font-size:13px">Respaldo para compartir con el dueño</div>
      <div class="backup-row">
        <button class="btn btn-green" id="export-backup">⬇ Exportar respaldo</button>
        <label class="btn btn-ochre" style="cursor:pointer">⬆ Importar respaldo<input type="file" id="import-backup" accept=".json" style="display:none"></label>
      </div>
      <p class="muted" style="margin-top:8px">Envía el archivo de respaldo por WhatsApp o correo. Al importarlo, reemplaza todos los datos de este celular por los del archivo.</p>
    </div>
  </div>

  <div class="card" id="print-area">
    <div class="serif" style="font-size:17px;font-weight:700;color:var(--green)">Reporte de la finca</div>
    <div class="muted" style="margin-bottom:10px">${fmtDate(state.repFrom)} — ${fmtDate(state.repTo)}</div>
    <div class="grid2" style="margin-bottom:10px">
      <div><div class="stat-label ok">Ingresos</div><div class="mono" style="font-weight:700">${fmtCOP(ingresos)}</div></div>
      <div><div class="stat-label warn">Gastos</div><div class="mono" style="font-weight:700">${fmtCOP(gastos)}</div></div>
    </div>
    ${catList.length>0?`
    <div class="pie-wrap" style="margin-bottom:10px">
      <div class="pie" style="background:conic-gradient(${gradient})"></div>
      <div>${catList.map(c=>`<div class="legend-item"><span class="dot" style="background:${c.color}"></span>${esc(c.name)} — ${fmtCOP(c.value)}</div>`).join("")}</div>
    </div>`:""}
    <table>
      <thead><tr><th>Fecha</th><th>Categoría</th><th style="text-align:right">Monto</th></tr></thead>
      <tbody>
        ${filtered.length===0? `<tr><td colspan="3" class="empty">Sin movimientos en este rango.</td></tr>` :
          filtered.map(t=>`<tr><td>${fmtDate(t.date)}</td><td>${esc(t.category)}</td><td class="mono ${t.type==='ingreso'?'ok':'warn'}" style="text-align:right">${t.type==='ingreso'?'+':'−'}${fmtCOP(t.amount)}</td></tr>`).join("")}
      </tbody>
    </table>
  </div>`;
}

// ---------- Events ----------
function bindEvents(){
  const txForm = document.getElementById("tx-form");
  if(txForm){
    txForm.querySelectorAll("[data-type]").forEach(btn=>{
      btn.addEventListener("click", ()=>{ window._txType = btn.dataset.type; render(); });
    });
    txForm.addEventListener("submit", (ev)=>{
      ev.preventDefault();
      const fd = new FormData(txForm);
      const { valid, record: rec } = parseTransactionForm({
        id: fd.get("id"), type: fd.get("type"), category: fd.get("category"),
        amount: fd.get("amount"), date: fd.get("date"), note: fd.get("note"),
      });
      if(!valid) return;
      const idx = state.transactions.findIndex(t=>t.id===rec.id);
      if(idx>=0) state.transactions[idx]=rec; else state.transactions.push(rec);
      state.editingTx = null; window._txType = null;
      saveData(localStorage, state); render();
    });
    const cancel = document.getElementById("tx-cancel");
    if(cancel) cancel.addEventListener("click", ()=>{ state.editingTx=null; window._txType=null; render(); });
  }
  document.querySelectorAll("[data-edit-tx]").forEach(b=>b.addEventListener("click",()=>{
    state.editingTx = state.transactions.find(t=>t.id===b.dataset.editTx); render();
  }));
  document.querySelectorAll("[data-del-tx]").forEach(b=>b.addEventListener("click",()=>{
    if(confirm("¿Eliminar este movimiento?")){
      state.transactions = state.transactions.filter(t=>t.id!==b.dataset.delTx);
      saveData(localStorage, state); render();
    }
  }));
  document.querySelectorAll("[data-filter]").forEach(b=>b.addEventListener("click",()=>{
    state.filter = b.dataset.filter; render();
  }));

  const invForm = document.getElementById("inv-form");
  if(invForm){
    invForm.addEventListener("submit",(ev)=>{
      ev.preventDefault();
      const fd = new FormData(invForm);
      const { valid, record: rec } = parseInventoryForm({
        id: fd.get("id"), name: fd.get("name"), category: fd.get("category"),
        quantity: fd.get("quantity"), unit: fd.get("unit"), unitValue: fd.get("unitValue"),
        minStock: fd.get("minStock"),
      });
      if(!valid) return;
      const idx = state.inventory.findIndex(i=>i.id===rec.id);
      if(idx>=0) state.inventory[idx]=rec; else state.inventory.push(rec);
      state.editingInv = null;
      saveData(localStorage, state); render();
    });
    const cancel = document.getElementById("inv-cancel");
    if(cancel) cancel.addEventListener("click",()=>{ state.editingInv=null; render(); });
  }
  document.querySelectorAll("[data-edit-inv]").forEach(b=>b.addEventListener("click",()=>{
    state.editingInv = state.inventory.find(i=>i.id===b.dataset.editInv); render();
  }));
  document.querySelectorAll("[data-del-inv]").forEach(b=>b.addEventListener("click",()=>{
    if(confirm("¿Eliminar este ítem?")){
      state.inventory = state.inventory.filter(i=>i.id!==b.dataset.delInv);
      saveData(localStorage, state); render();
    }
  }));

  const cowForm = document.getElementById("cow-form");
  if(cowForm){
    cowForm.addEventListener("submit",(ev)=>{
      ev.preventDefault();
      const fd = new FormData(cowForm);
      const { valid, record: rec } = parseCowForm({
        id: fd.get("id"), name: fd.get("name"), weight: fd.get("weight"),
        lastCalvingDate: fd.get("lastCalvingDate"), healthNotes: fd.get("healthNotes"),
      });
      if(!valid) return;
      const idx = state.cows.findIndex(c=>c.id===rec.id);
      if(idx>=0) state.cows[idx]=rec; else state.cows.push(rec);
      state.editingCow = null;
      saveData(localStorage, state); render();
    });
    const cancel = document.getElementById("cow-cancel");
    if(cancel) cancel.addEventListener("click",()=>{ state.editingCow=null; render(); });
  }
  document.querySelectorAll("[data-edit-cow]").forEach(b=>b.addEventListener("click",()=>{
    state.editingCow = state.cows.find(c=>c.id===b.dataset.editCow); render();
  }));
  document.querySelectorAll("[data-del-cow]").forEach(b=>b.addEventListener("click",()=>{
    if(confirm("¿Eliminar esta vaca? Sus litros ya registrados no se borran.")){
      state.cows = state.cows.filter(c=>c.id!==b.dataset.delCow);
      saveData(localStorage, state); render();
    }
  }));

  const calvesToggle = document.getElementById("has-calves-toggle");
  if(calvesToggle) calvesToggle.addEventListener("change", ()=>{ window._hasCalves = calvesToggle.checked; render(); });

  const milkForm = document.getElementById("milk-form");
  if(milkForm){
    milkForm.addEventListener("submit",(ev)=>{
      ev.preventDefault();
      const fd = new FormData(milkForm);
      const hasCalves = calvesToggle ? calvesToggle.checked : true;
      const { valid, record: rec } = parseMilkForm((name)=>fd.get(name), state.cows, hasCalves);
      if(!valid) return;
      window._hasCalves = hasCalves;
      const editIdx = state.milkRecords.findIndex(r=>r.id===rec.id);
      if(editIdx>=0){
        state.milkRecords[editIdx]=rec;
      } else {
        const dup = findDuplicateMilkRecord(state.milkRecords, rec);
        if(dup){
          if(!confirm("Ya existe un registro para esa fecha. ¿Reemplazarlo?")) return;
          rec.id = dup.id; // keep the same identity so any linked "Venta de leche" transaction stays in sync
          state.milkRecords[state.milkRecords.indexOf(dup)] = rec;
        } else {
          state.milkRecords.push(rec);
        }
      }
      state.transactions = syncMilkSaleTransaction(state.transactions, rec);
      state.editingMilk = null;
      saveData(localStorage, state); render();
    });
    const cancel = document.getElementById("milk-cancel");
    if(cancel) cancel.addEventListener("click",()=>{ state.editingMilk=null; window._hasCalves=null; render(); });
  }
  document.querySelectorAll("[data-edit-milk]").forEach(b=>b.addEventListener("click",()=>{
    state.editingMilk = state.milkRecords.find(r=>r.id===b.dataset.editMilk);
    window._hasCalves = state.editingMilk.hasCalves !== false;
    render();
  }));
  document.querySelectorAll("[data-del-milk]").forEach(b=>b.addEventListener("click",()=>{
    if(confirm("¿Eliminar este registro diario? También se eliminará la venta de leche generada, si existe.")){
      state.milkRecords = state.milkRecords.filter(r=>r.id!==b.dataset.delMilk);
      state.transactions = removeMilkSaleTransaction(state.transactions, b.dataset.delMilk);
      saveData(localStorage, state); render();
    }
  }));

  const repFrom = document.getElementById("rep-from");
  const repTo = document.getElementById("rep-to");
  if(repFrom) repFrom.addEventListener("change",()=>{ state.repFrom=repFrom.value; render(); });
  if(repTo) repTo.addEventListener("change",()=>{ state.repTo=repTo.value; render(); });

  const exportCsv = document.getElementById("export-csv");
  if(exportCsv) exportCsv.addEventListener("click", ()=>{
    const filtered = state.transactions.filter(t=>t.date>=state.repFrom && t.date<=state.repTo);
    const csv = buildTransactionsCsv(filtered);
    downloadFile(csv, `finca-cuentas-${state.repFrom}_a_${state.repTo}.csv`, "text/csv");
  });

  const exportBackup = document.getElementById("export-backup");
  if(exportBackup) exportBackup.addEventListener("click", ()=>{
    const payload = buildBackupPayload(state);
    downloadFile(payload, `finca-respaldo-${todayISO()}.json`, "application/json");
  });

  const importBackup = document.getElementById("import-backup");
  if(importBackup) importBackup.addEventListener("change",(ev)=>{
    const file = ev.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const result = parseBackupData(reader.result);
      if(!result.ok){ alert("El archivo no es un respaldo válido."); return; }
      if(!confirm("Esto reemplazará todos los datos de este celular por los del archivo importado. ¿Continuar?")) return;
      state.transactions = result.data.transactions;
      state.inventory = result.data.inventory;
      state.cows = result.data.cows;
      state.milkRecords = result.data.milkRecords;
      saveData(localStorage, state); render();
      alert("Respaldo importado correctamente.");
    };
    reader.readAsText(file);
  });
}

function downloadFile(content, filename, mime){
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

render();

if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("sw.js").catch(e=>console.error("SW error:", e));
  });
}
</script>
